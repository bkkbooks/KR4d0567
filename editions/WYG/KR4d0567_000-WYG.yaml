body:
  text: 桐山老農集别集類四元提要臣等謹按桐山老農集四巻元魯貞撰貞字起元自號桐山老農開化人集中萬青軒記自稱曲阜人蓋曲阜其祖貫也貞生當元末明初是集中文作於元者皆題至正年號其入明以後惟題甲子有栗里抗節之思焉凡文三巻詩一巻詩不出元末之格且間有累句蓋非所長其文亦聞見頗狹或失考正如武安王廟記迎神詞中有蘭佩下兮桂旗揚乗赤兎兮從周倉句考周倉之名不見史傳是直以委巷俚語鐫刻金石殊乖大雅然人品既髙胸懷夷曠一切塵容俗狀無由入其筆端故稱臆而談自饒清韵譬諸深山幽谷老柏蒼松雖不中繩規而天然有出塵之意其故正不在語言文字間矣乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:2994a93b9d9afcebd5f75b3eee1c16136c96b53ebd3dd51316cbb4620e6ce207
