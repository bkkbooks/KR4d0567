body:
  text: 桐山老農集卷三元魯貞撰雜著題趙章泉詩後未亂前程希茂携趙章泉詩二紙求予書其後置之箧笥中未及歸而盗起又十年矣予家所藏書為之一空暇日拾所遺簡册中惟此詩尚存欲訪希茂歸之而已亡一日徐文淵至予家書程公謹所賦萬青軒詩予因思此詩可以歸之公謹蓋公謹於希茂為一家而其尊人紫崖先生嘗與章泉逰故也詩者吟咏性情優㳺和平優㳺不迫至於用字生澁鍊句强硬使人讀之激唇刺吻而無味此宋末詩人之失亦其習之然也然此詩所謂忘寢宵興不廢簡編者可見古人為學雖老而不輟也吾徒見之當可以自警故書以復其巻于公謹焉贈龍文夫何少華之峻高兮參列星而為侔埶廣大而盤踞兮氣滛溢而上浮凌昊空之岌嶪兮廓回環以綢繆建雄標於鴻濛兮起太虚而獨抽層峰湧而流躍兮翠草爛而不收儲元精而下注兮産瓊液於靈湫石嶙峋以硱磳兮若繚垣之四周森駢交於矗起兮隂霏微而欲流白玉以為底兮蓄清泉之幽幽映峭壁而揺蕩兮羅織紋之潏潏視若淺而實深浸澄潭之積雪玉色交以映人兮絶纎埃之清潔雨彌旬而不漲兮日流金而不竭極瑩净而無瑕兮含内柔之明徹誕白顆之轇轕兮接素彩於明月發寒威之凜冽兮解人世之炎熱信兹山之精神兮奚至斯而融結惟神龍之育質兮稟純陽之昭晰象乾道之變化兮諒潜飛之有節集衆美于厥躬兮塊獨處此貝闕妙感通之無方兮亘萬古而不滅望天津之浩洋兮波瀰漫而無涯神物雜遝乎其中兮涵星宿之光輝若東海之最鉅兮積太隂以浸之蓬壺欝其中峙兮環弱水之逶迤群仙往來乎其上兮折三花而娛嬉龍皆外而勿居兮處此山之清奇山有似乎蓬壺兮水有似乎天池故神龍之自處兮孰大小之能窺惟無求于欲兮廓澹然而無為世有求於吾龍兮願作雨以潤穡歳八月之旱兮衆禱祠之以惕召屛翳以先驅兮豐隆奔而效職雷塡塡而先後電閃閃以交織戒風伯以清塵雨師群以相逆沃焦土以沛澤兮忽煩熇之屛跡錫農夫以西成兮實神龍之大德聞兹美而遂往兮吾將憑虛而附翼攬予轡而南行兮御清風之揚揚盻少華之巍巍兮隨飛雲以翺翔至黃石而一息兮旦予將至于仙鄉近靈境而止宿兮肅予中而清静久離群而自晦兮不與世以相競憫人生之須臾兮老冉冉以來迎闡九陽之緒言兮知金丹之延命歴火候之周天兮凢十月而入聖質兹聞於神龍兮庶脩行之有定上寥寥而混茫兮下肅肅而凝瑩日杳杳而無見兮耳寂寂而無聽叩靈洞而陳詞兮惟神龍其予應故高節書院山長徐公墓誌銘夫人之為學内之修諸身外之修諸政修之身者我之所可必施之政者非我所能必雖不能必茍能行之於家則家猶國也君子之觀人見其能治家則知其能治國也予嘗求之今之人得故高節書院山長徐公焉衢之徐葢偃王之後也韓子所謂散之徐揚二州之間者公諱某字某五代末有諱榮者仕至中奉大夫始居開化之芹川八世孫飛習文武藝宋理宗時貢補文武二學試武舉挽二石弓弓折以此見黜遂不仕號白雲處士次子丙承信郎浙東路分有子二人長紹中漕武為進勇未及受郎官而卒次懿和初烏江縣尉有子六人公其次子進勇無子以公為後未幾一兄亡一弟出繼同居者四人處事一以烏江為法事母孔氏至孝溫凊定省未嘗少懈兄弟將析家産公合得半因喟曰吾獨有家産之半彼三弟者何以為飬遂於其田十取其四以其六歸之三弟又以所得若干為飬母之資令㓜弟司其出入一無所問又謂三弟曰吾産旣厚凡官府之供給親戚之往來爾無預也居常怡怡無間言鄉黨稱其孝弟待人接物以信人有急難則救之有匱乏則周之逋有負不能償者則免之人懷其惠欲有所為則人争趨之里有争來就公決公為剖其是非咸悦服以解其為人沈黙寡言寛而有容大德間有以茂材薦公者省除常山縣敎諭秩滿調餘姚州高節書院山長將之任以丁父憂旣終其喪不復為仕進計築宅於故廬之西偏以居又葺二廬以居二子竹木花果交植屋之前後可以娛目可以悦心菽粟雞豚足以供祭祀採山釣水足以待賓客三弟子姪足以供使令優游自適足以樂天年所謂為政其在斯與予聞人有善行而不得用於時者子孫必昌公子曰蘭曰華與予逰好學而文其兄弟衆多予雖未獲盡見而皆向學子孫之昌未艾也公生宋壬申没于後至元辛巳年七十葬于大石潭祖壟之右父即進勇祖即路分曾祖即白雲處士娶劉氏子四人女二人孫八人華以公之行求予銘遂述其事而為之銘曰人之有為而不用時于其一家見之設施由小覘大國亦如之以公之材而止于斯豈非命耶為善者報有子有孫詩書攸好曰蘭曰華前唱後和兄弟衆多不弱一个將有顯者以大其家人定勝天斯其匪誇石潭之阜草鬰松茂伐石刻詩以期厥後故遂安縣主簿孔世廣墓誌銘孟子有言君子之澤五世而斬葢為常人言耳若聖人之澤雖百世猶未艾也豈止五世而已哉今觀孔君之行尤信君諱灝字世廣去先聖五十有三世去宋御史中丞諱道輔九世中丞之孫諱傳随高宗渡江賜居衢州贈中奉大夫生端問奉新縣丞奉新生璹漳州錄事錄事生攄銅陵縣丞君之曾祖也銅陵生應發武寧知縣君之祖也武寧生紹字成叔君之父也少工詞賦有聲宋末官從政郎工刑部架閣元初革命以先生為西安縣達嚕噶齊不任再辟清節書院山長又不任娶徐氏先没再娶王氏生三男㓜則君也君早孤奉母以孝聞由孔氏恩例得寧國路學正轉政和縣苦竹寨巡檢丁内艱服闋海寧州儒學敎授憲司帥閫以掾辟不就家居時四方盗起江浙叅知蘇天爵㧾兵過衢選主西安簿轉餉給軍有功升江山縣尹尋勑授將仕佐郎建德路遂安縣主簿蒞政數月治有成績忽嬰微疾遂至大故思朴自䕶喪以歸君㓜聰敏嗜學心事坦夷外無崖岸雖有聞不自大恭儉慈仁生於至元甲午八月十有二日終於至正乙未九月三日年六十二娶劉氏安康郡侯之孫男三人思朴思模思森女二人孫男一人克喆以明年丙申十二月庚申葬于西安縣之西溪源銅陵墓側劉氏生於壬寅七月二十一日没於乙亥十二月初八日年五十八附葬西溪之源思朴以君之行實來乞銘貞與孔氏交三世矣遂不辭謹述其事而論之曰自聖人至君五十有三世矣而君之兄弟皆彬彬有學食祿于時以世其家所謂聖人之澤雖萬世猶未艾者也銘曰三衢孔氏自中奉始曲阜太末二宗對峙代有顯人不替厥緒聖人之澤百世不已惟遂安君克紹厥美設教縣庠縣庠以舉轉餉給軍其績愈偉由是而升佐政百里為治有方建立綱紀天命有定一疾遽死嗚呼痛哉九京莫起西溪之源厥土剛只卜葬于茲附以劉妣聖人之澤譬諸流水出為溪澗瀦為沼沚將有瀦者其在孫子其在孫子作詩以企程道夫墓誌銘予嘗銘則明之墓矣後十有九年程容以其父道夫之行來求銘則明弟也道夫兄也旣銘其弟不銘其兄不可道夫姓程氏諱寜其先成王時庶子伯爵於廣平程國國亡後復以為氏至晉鎮東將軍元潭守新安居歙之黄墩卄九世孫伯之徙居開化之龍山道夫其裔孫也道夫兒時有大人志及長勤儉理家能稱父母之意父母終喪祭以禮服闋人意道夫必分兄弟而食乃相語吾兄弟既不分於親在之日今乃分於親終之後乎各以所有共為出入或以役事當詣縣若府兄弟互往事己不私留財縣令以其友愛之篤也名其堂曰怡怡以表之故廬燬復創新居高明清塏置琴棋圖史其中前後植花木毎當春芳繞砌秋月籠軒命斚歌風壎箎互和賔親至則欵之盡歡教子姓以禮義敦柔行端確閨門嚴族姓和喜怒不形雖甚恚能容里人争鬭公為折中皆得其平公生於某年某月終於家年七十公與弟生同氣死不忍異穴與弟合葬遯山之岡子三人容起挺孫六人曾孫三人時至正八年九月庚申也父器祖伯從曾祖埏吾聞漢時姜肱弟兄友愛常同卧起而田氏不忍析産庭下荆樹復榮世降俗薄有視兄弟如路人者有如㓂讎者聞道夫之風可以愧矣此予之所以既銘其弟又銘其兄也銘曰鄉鄰有鬭披髪相救胡今兄弟相視若㓂至于急難乃等嬉戱婦有後言反唇而稽天倫之斁如波之靡頽逸潰散不可陳只不有知者孰為作新龍山程氏兄弟二人弟敬其兄兄友其弟兄語弟從弟行兄繼邑有令尹名堂怡怡表于鄉里俾民效之民之效之自程氏始彼不弟者胡不愧死吉日良時卜云其臧兄弟合葬遯山之岡伐石作詩用昭厥美咨爾後人毋墜成緒代方平叔祭江寧縣尹鄭邦寧文惟公抱有用之才蘊有為之志處富而好禮結交而尚義見敏而明氣剛而智待宗族以和周貧困以利接人以誠而賓客歡待下以誠而家事治樂道以飬高懷仁而慕義為善若不足獨立而不懼謂宜室家之胥慶而享壽之耆頥豈期一疾而命止於斯謂宜有位而能祿豈知世道艱而不得見之設施嗚呼痛矣哉某等萍梗之踪東西無依一旦相見遂結新知意氣之同有若蓍龜朝夕居處欣戚同之公乎奈何九京之歸哀動于中有泪漣洏生也倐忽薤露生悲白楊蕭踈寒風凄其想像音容邈不可追公乎有靈來舉予巵尚饗謁武夷精舍祭文維昔聖賢繼天立極厥綂承承而靡有惑於皇宣聖乃集大成孟受思業孔道以明自是而降大音絶響異言啾嘵千岐並往道則如砥夫豈人遠胡然却行不畏日晚遐哉邈矣誰紹絶學帝實惠民是生先覺周發其微伊洛達之先生嗣興推而廓之猗歟先生篤實剛明深探詳辨黙契力行悠然千載獨會于心述經立言紹于斯今諺所謂祥景星鳯凰至於用世曷有曷亡生以為命不如稻粱一或有違孰不遑遑有炳遺訓至理孔彰貽爾來者飢饔渴漿兹溪之曲巋然厦屋有寢有堂公手所築貞來再拜瞻仰太息遺墨在梁猶見顔色神倐來逰千崖以秋風生澗響雲行山幽神聿其歸棟雨霏霏烟鎻岩扄鶴唳林悲酌溪之泉酹以遺像侑以詩歌庶幾來享弔嚴子陵祭文歲己未之仲冬兮予舟行乎嚴瀬經先生之釣磯羗四顧而興慨冐埀堂以逰目兮覽山川之勝槩豅束而湍激兮沙與石而相磕山岋岋以旁圍兮水渺𣺌而來㑹頵石矗以造天兮奔雲結而為蓋叩先生之遺跡兮恍髙風之猶在昔炎劉之中葉兮薫與蕕之雜揉偭通衢而不騁兮反彳亍於蓁莾捐蘭芷於笥外兮羗以為不芳也擷蕭榝以充佩兮曰此為良也大厦之傾兮非一木之可支江河之竭兮豈線流之能輸道之不行兮時不可為也遂全身以遠害兮亦先生之宜也迨故人之龍飛兮復炎祚於旣滅胡頓然而忘之兮曾不屑於一謁懷珎以自潜兮詭跡以自絶曁旁求之旣遍兮始為君而一至何狂態之猶故兮感天象之呈異終然衮冕之榮兮不易山林之志退復從於初服兮不求聞逹於斯世皇天之生賢哲兮固將以之而覺斯民舉皆封已以高尚兮又何賴乎斯人昔夫子之遑遑兮亦豈其有他故見赤子之呱呱兮將為之乳哺彼沮溺之並耕兮曾不足以語此而楚狂之過門兮又何歌之為訾是以聖人之道兮貴時中而後止周天下而不遇非聖人之眞情豈忍遽棄乎斯世兮曰吾道之不行使先生而悟兹兮胡為而至斯哉將猋舉以響應兮䇿奇勲於雲臺奈何其不然兮獨高尚之不可回雖不周于古道兮抑亦可以為清矣彼射郤以抵􅇖兮惟恐容身之無所惟先生之高視兮曾何足以芥蔕萬鍾之不屑兮又何有於成敗斯其所以為先生兮雖千載猶未沫苟致君於當時兮未必芳名之如斯重曰前先生之避世兮吾無能以議為後先生之獨善兮爰結辭以問之祭葉蟾心文歎人生之須臾兮時旣往而不返質萎弱而莫恃兮旦遒忽而遂晚歎濁世之紛汚兮競蚊蚋之縱橫羗欝結之無解兮獨欿切而屛營夜漫漫而不寐兮氣涫􅘺而若驚志惝惘而不舒兮愧獨此而勞生願逍遙以遠舉兮從赤松而登仙服醇粹以保神兮長恬愉以引年去埃􅅽之煩寃兮超衆患之牽纒何兹願之未果兮遭塵網之拘攣美高人之化羽兮若有得乎自然坐寥寂而遂徂兮形枯槁而日朘遠末路之汶汶兮去故鄉之翩翩舍嗜欲之怦怦兮離形智之翾翾乘太虚之鴻濛兮與坱圠以周旋漠清静以廓落兮澹無為而不遷彷彿至乎清都兮造閬風而留連神浩蕩而娛嬉兮凌天池而孤騫保厥美而不放兮仍丹丘之綿綿惟高人之在世兮當覲君之龍顔被紫衣之披披兮帶黃金之珊珊綰墨綬於㑹昌兮留遺愛於南寰旣致仕而飬高兮日徜徉于溪山忽云疾而遽亡兮呌浮雲而不聞瞻高風而太息兮涕交頥之沄沄林蕭條而無聲兮野曠蕩又無人風颯颯而申寒兮嚴霜下此秋旻衆芳黯黯而將謝兮値鵜鴂之悲鳴白日晼晼而遂西兮列星出而極明月去望而銷鑠兮夜逴逴而已𡨕悲蕙華之旖旎兮從風雨以飄零華紛委以變色兮枝萎黃而樛橫聽蟋蟀之呻唫兮雁繽繽而南征痛高人之日遠兮中瞀亂之幽幽羞蕙肴之􅀈􅀈兮奠桂酒之瀏瀏采蘭英以為蔬兮屑瓊枝以為餱兹陳辭之耿介兮靈庶幾而少留尚饗桐山老農集卷三
