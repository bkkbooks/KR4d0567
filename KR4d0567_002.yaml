body:
  text: 桐山老農集卷二元魯貞撰序送劉縣丞子光道光遠序常山縣丞劉彥英溧水人也豫嘗識其兄彥敬於松江俯仰十年事豫間居山中今年二月七日豫適出郊外及歸彥英來訪不及見也諭以詩又知彥敬之有弟也寒食后二日二客過家問之則彥英嗣也丰神清爽逈然非庸衆人與之語溫乎其有倫也粲乎其有理也光遠盛修齡之壻也修齡與豫為同年然則豫與光道光遠有通家之好焉人之生子得一以紹箕裘足矣况二子皆有才美耶於以見劉氏之多賢子弟也古人之所謂難兄難弟者今於劉氏見之其來見我也無所能猶將進之况有學有文乎豫聞道若康莊然人之由也求以止夫所止之處也若旁岐他徑荆棘蒙蔽山石交加求至於所止之處不蹉則跌其至也豈不難哉又有欲適越而北轅欲適燕而南轅雖行役窮年求至適所止之處不可得也學者由致知力行以求聖人之道是由康莊以求止夫所止之處何其易也由百家諸子以求聖人之道是由旁岐他徑以求止夫所止之處雖至亦難矣由佛老異端以求聖人之道是由適越而北轅適燕而南轅不可至也必矣二子由豫言而求聖人之道而不至乎所止之地者豫不信也又聞百川赴壑而至于海非其不已也曷以至于海也試以是思之光道光逺之見我得以敘通家之篤焉故書以贈之送計希孟序君子之出處有義存焉其出也其處也莫非義也伊尹之就桀也義也桀不能以用天命之去耶天命既去則獨夫也其就湯也伐獨夫以安天下亦義也管子從子糾出奔君臣之分未定也不死事仇未害於義也相桓公匡天下亦義之可為也夫以出為當出不若以義度之而出也以處為當處不若以義度之而處也出亦義也處亦義也君子之出處亦如是而已浮梁計希孟介宗暘不遠百里訪豫於梧板之草舍曰近年盜起嘗以民兵從元戎征討軍敗幸免今路稍通將歸而讀書故山不復出矣求夫子一言歸為鄉里父兄道也時天雨雪不止留於家三日希孟求不已宗暘又為請因為之言曰希孟之從軍義今歸故山不復出可嘉矣茍有用子者起而從之管仲之所以相桓公也又何以不出為哉恐其未達於斯也故以前賢之出處合於義者告之古今文典序太乙肇判天地萬物之理不能以自明惟其言能宣之人惟能言而不知其理猶不言也聖人知其理而能言之而後天地萬物之理昭晰於天下而人文之由始也伏羲畫卦而易作二帝授受而書興太史觀風而詩集夫子正王道而春秋成言出而理明不飾而自文所以為天地立心為生民立命為萬世立天極也自是而後理必學而後明言必飾而後文蓋有聖人開之於前也若曾子子思孟子能飾其言以明其理亞夫經者也自是而變於是乎有若左氏之雍容莊生之飄逸戰國之明辨賈誼之雄偉太史公之質實皆能飾其言者言能明其道而古文亡矣是雖未足以明理而能達其所言之意者也變若東漢若三國若六朝文不能飾其言言不能明其道而古文亡矣至唐韓愈氏出文能飾其言言能明其理宋歐陽子和之而後大行復還前人之盛然恨其明理者少而達意者多也若柳子厚若二蘇若曽子固皆致飾其言以為文而違其意所能言者明理雖未而文足以繼乎前人豫暇日自五經而下取凡作者編為古今文典謂之古文者非謂上古也以其奇辭異體人所不能道如天球河圖而不可數見者也自愼到止怪石供凡若干篇為古文典謂之今文者非謂今日也以其敘事論理人所不能無者也如盆盂衣服人資以用而不可缺者也自絶秦王止曽子固凡若干篇為今文典典故法也欲學者以為法也甚矣文之難也自孟子以下至於今日二千餘年間號為能者止此十許人耳是二百餘年而得一人也若唐之韓子則三百年矣夫以三百年有一人何其少也惟其少也是以難也規矩周密體制備具後有作者如匠石之能循規矩也或曰作者衆矣今曰止此十許人者若過矣然文不足以飾其言言不能以達其意上不能以承乎古下不能以垂於後非吾之所謂文故不取也吾之所取止於此矣復乎前人之美則豫之所望也有能由是而求作文之標凖若屈原之離騷别為一集則程朱之文學自當讀之兹以取文故不及也言必飾而後文不飾不可以為文欲飾其言必由於學而文所由以作也文既作者世之飾其言者何其多也然皆達其意之所欲言而不能以明理而四維之文於是乎息矣贈方平叔序方平叔與豫居相近年十一喪母十二喪父鄰人許妻以女遂衣服食其家年二十四一旦如有所感棄家入廣遇師授以雷法拜薩九陽于羅浮聞金丹之祕歸而道法顯呼召雷雨立至王公貴人多敬之贈以物輒不受人有急則救援之或隨身帶鏹遇貧困者與之無吝色人皆號之曰方神仙又今將逰江湖求九陽未盡之旨徴言於豫豫謂人惟有欲也故不能學道子女玉帛人之所欲而平叔無所欲可以學道矣又聞金丹之祕於九陽之徒矣怪世之言金丹者知藥物而不知火候自復而乾由庚甲歷一陽至九陽進陽火也自姤而坤自申而已由一隂至於六隂退隂符也所謂年中用月月中用日日中用時時中用刻者也子行江湖遇知音者而問之其言與斯言合者是真知金丹者也子其參焉師焉苟有言者不合於斯言也是人也亦妄言耳子遂去之而勿與之言可也夫以子之不欲而求之之切也其必有所遇以終九陽之旨於是書以為是行之贈送程子長北逰序程君子長氣剛而方學粹而文性好逰常踰淮涉江南至浙之右近處江之左覽江山而得其勝擇人物而交其逰不以為足復謀於豫曰吾以為逰趙乎夫趙多感慨悲歌之士感慨則志不固悲歌則志不立吾固不往吾以為逰齊乎夫齊太公之故國也尊賢尚功流而為霸故其地人多詐吾意其餘風猶在吾又不往吾以為逰秦乎夫秦棄禮義尚勇力今吾冠章甫衣縫掖無所用之吾又不往吾以為逰鄭乎桑間之音靡靡之樂夫子之所放也而以我為願聞鄭聲者乎吾固不願聞鄭聲者也而吾又不往是逰也舍京師無適己京師風雨之所交也文獻之所宗也四方之所輳也無悲歌以感之無變詐以惑之無勇力以威之無鄭聲以蕩之遇則能使吾貴如瑚璉通則能使吾明如秉燭尊則能使吾重如九鼎進則能使吾榮如春華然則舍京師無適己子以為如何子聞之曰智者不懷才以徇人仁者不藏道以忘世夫能有為之為才人求之我舍之非知也人舍之我求之非知也夫道將以共由之也己由之而不能使人由之非仁也天下不由之而已不去之非仁也嗟乎貴君明君重君榮君在人君貴君明君重君榮在君在人者君無與焉在君者君其愼之其逰也豈不綽綽哉豫往嗜學而不能館於人好逰而不能求於人既無他能又苦家貧用是常不能遂其志君居則人敬以為師出則人慕以為友豫是以不及君君自計有餘矣又何以謀於豫也送涅古柏主簿序至元二年冬十月部使者至衢衢去開化百五十里民之耄耋相扶携造使者庭舉主簿涅君之能曰君自始政至今不怠道路橋梁無不理者夏飢君賑恤有方民無菜色使者未之然也至常山常山鄰縣民不於其官之稱而稱君至開化民之舉君益衆使者由是然之案牘稽延以君故無所問復戒勉于政愼厥終邑人魯貞曰此可以見人情之所與也茍不與雖刑驅勢迫不肯從設有從者非其情也且君何以得是於人哉其志確其行直其志確故不為賄動其行直故不為私撓確而且直雖神鬼其順之矣况人乎且人之所以舉君者公耳公者人之所同也夫民豈難治哉得其情則喜逆之則怨為政者亦惟得人情而已彼為政者而人不與者逆乎人情者也太上得民心其次得民情其次不失人情然則君之得是於人者蓋不失人情也使君異時調他縣他縣之政愈於今升臺省臺省之政愈於他縣是為不負邑人之所舉是為不負部使者之所與也送徐仁可之上海典史序友人徐仁可世業儒以儒者之業博大難成也去而從吏今為上海縣典史將行求贈言於豫夫仁可求言豈徒以耀於人蓋將聞善言以自益也試為仁可誦所言夫常人之情不剛則柔剛則折柔則屈未有得剛柔之正者也子獨不見夫金乎愈煉而色愈明愈久而質愈堅誠天下之至剛也至於範以為器或方或員細如絲曲如鉤薄如紙常如人意是剛而能柔也故剛而不折子又不見夫水乎激之則濺上決之則注下東則東西則西是物之至柔者也至其潰山嶽突隄防當之者摧觸之者傾孰之能禦是柔而有剛也故柔而不屈知其説者斯得剛柔之正矣仁可操刀筆日久閲歷世故日深其於處己治人固已素定於胸中豈假豫言而自勉焉若夫剛近於躁柔近於僻毫釐之差則失之愈遠豈但折屈而已哉故為仁可誦之使時以是自考則得剛柔之正矣送鄭道源之金陵序釀黍以為酒麯糵之和有常劑矣而其味之或甘或冽或辛或旨則非人之所能必也調水以為羮醎之以鹽酸之以梅期于適口而已然而欲甘而甘欲酸而酸則固人之所能必也隂陽之相蕩而人生焉矣然而不能必其昏明強弱也猶釀乎酒之不能必其旨列歟人生而各有所業欲儒者為儒欲吏者習吏欲農者務農欲商者從商欲工者學工猶調羮之能必其醎酸歟然而人之昏明強弱之不齊惟儒者能變之農吏工賈不能也人而不為儒猶棄稻粱而嗜粳秕也夫為人莫如儒宜其世之人舉皆以為儒也而其從農從吏從工從賈者何其多也惟其不為儒也反群聚而笑之者有之矣豫嘗求其故矣彼竊儒之名而無其實者聽其言誠儒也察其貌又儒也問其行則非也其為世之訾笑儒也世固有儒者而人未之知也夫儒者以其所能必之志而變其不能必之天窮理則知可至矣力行則德可進矣守之以誠則道在我矣行之以恕則善及人矣是儒者之能也特患人之不知耳苟知之則將為之為之不暇又奚暇乎笑往年玉山鄭復初篤學力行由進士為德興丞為處州録事勇於行義不畏強禦不顧利害卒為豪有力者噬去人無賢愚聞者莫不為之扼腕然後知世之以儒為訾笑者笑竊儒之名者也非笑夫儒者也鄉人鄭道原受業復初之門於四書於書既吮嚼而啜其味於詩於文又咀囁而嘗其腴忽别豫將逰於金陵求一言以自壯夫為學之方修已之要道原得之復初深矣豫何足以及之然朋友有切磋之義大江之東復初之鄉也金陵又復初所嘗逰也必有見而知之者道原往益求鄭氏之學如口之於味則能變化氣質為儒者毋徒曰儒以取世之訾笑哉是則豫之切磋之義也送徐起潛之同古市巡檢序靜江古桂林也其地極中國之南多荒茅篁竹叢薄深林其境與蠻獠相鄰其風土與中州殊其田瘠其民不常徉狂而狼貪其山皆卓然拔出伏至地聳造天峯巒四面駢立若笋其居顓顓依險厄控御一乖輒群聚而剽竊警羅誠謹則雉兔遂入夷島中其氣候不齊天雨即蒸濕稍暖故瘴熱無論四氣霧襲人身煩寃潰亂其仕者往往無久居志每自解弛去而巡捕官為甚致有假故不行者橫塘徐君由晦庵書院山長秩滿調靜江福泉縣同古巡檢命下即戒途且徴言於豫以自壯豫固不惜夫言也橫塘日煆戈砥戟矯箭躍馬從卒三十人周旋溪洞澗谷間以求盜而獲之則戢暴之法不如是也飢得食寒得衣老弱得飬使之各得其欲而自不為盜是守令之責也非巡檢之所得為也凡人之情就利去害愛榮惡辱無彼此之異也議者猥曰蠻性忿鷙易變難復不深究切之所以仁之也示之以向背申之以信義所以懷之也自負固不服率令即掩襲而搜擒之所以威之也與其生事以自戕孰若相安於無事彼固將去其輕悍忘其險阻以從我也今之人所以憚去故舊而適遠方者何中無所飬而外纍於物也茍有所飬於中隨其所飬而安雖炎鄉窮僻猶不足以纍之也橫塘用豫言以弭盜以處身而盜不息身不泰者豫不信也吳氏及幼方序余九歲時讀書家孰有醫者吳恭甫年七十餘其身矮小龎睂白鬚髮手執桄榔杖布衣而皂絛見豫出對曰俊傑今看魯兩生豫應聲曰英雄昔傳漢三傑恭甫喜後三年豫出疹父石溪翁夜往石井請吳仲高服其藥而透仲高恭甫子也餘症未解仲高命其子舜卿來治藥病愈豫得子又孫遇病必服其藥家去年孫宣遇出疹服得新藥愈夏豫冒嵐氣氣逆喘甚得新曰沙也以繩刮之紅點如沙針刺指甲縫出血黑服藥而愈豫今七十三見得新父子曾孫五世矣而豫可謂老也於是知恭甫之有後而醫道之日以行而子孫日以昌也豫雖老而著書不知年之日加也恭甫兄慶甫刋及幼方以濟人值亂板亡得新勉其子以家學復鋟板以繼前人美可也亂後人家多廢而豫與德新獨存可不知其所自邪桐山老農集卷二
