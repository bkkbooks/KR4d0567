  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0567_WYG_004-1a, image: WYG1219/WYG1219-0150a.png}
body:
  text: 桐山老農集卷四元魯貞撰詩歌行庚子夢徐竹隱竹隱於豫長十歲長者是兄小者弟埀老結交不論晚同心何啻花同蒂挽舟鑑湖探禹穴天衣雲門逰相繼觀松龍井泉泠泠回首飛潮喧海澨自兹别去已七年秋水盈盈不可厲大地紅塵撲面來遙望塗山眼為昧兄歸竹隱無恙否弟竄深山誠拙計忽然清夜入我夢相對無言意彌契訪子延我坐中堂問訊之餘方欲憩蘧蘧而覺知是夢月照梅花聞鶴唳可憎翁歌君不見黃石東皇元有客可憎翁白髮未白耳半聾稜稜骨肉貌中古獨行踽踽前賢風又不見君翁之踪有時傲睨呼清樽長歌短詠天地中醉來未覺酡顔紅幅巾革帶不足貴一生取豫何其公有財不肯輕恤匱有詩不肯輕干貴渠自渠兮儂自儂清風明月十畝屋樂莫樂兮情親同是以風俗薄往往楊公鳴呼為可憎翁翁亦不為錯翁之可憎翁己知人知憎翁翁不疑憎兮元是愛之本愛兮元是憎之基一憎一愛在人耳請君呼酒歌斯須雪墨題詩天女織花飛玉屑下顧陶泓駐瑶轍𤣥英射月兔穎濕化作龍蛇形曲折字字寫出天花香黑白混合成文章虞庭賡歌相頡頏封上琅函達玉皇寄煉師方善可青霞道士人不識呼叱風雷指顧間月滿秋山騎鶴去雲生曉洞斬龍還拾荆煮石能醫病煉汞成金好駐顔我每喜交方外士幾時相與扣𤣥關雪瀛海仙妃騎白鳯夜栖十二瓊樓凍雪縷銀絲織龍水花影滿天韶色裏夢入崑山奪𤣥圃老蛇張髯鶴起舞盆捧明珠壽王母神雲捲春留太古回首乾坤色界空玉龍嘶原闕四字松花餅蒼龍吐涎結黃玉并刀開雲落香肉蓮房夜釀百花膏膩瓊膠粉神功勞金盆捧月疲蟾舞飛入黃庭驚姹女幻出明珠照仙子汞葉鉛枝織花雨松花之餅能休糧道人得此真奇方緘封遠寄令我餐後天而老凋三光古選重陽留唐山皎皎天氣晶熙熙日華動雲消石崖露風過林葉閧唐山逢九日菊蕊無由供生平不嗜酒豈待白衣送登臨山水間輕裘薄寒中蘊真思方愜覽勝目自縱良朋偶然出談笑雜嘲諷更辱信宿留情親意彌重暌違念合屛浮生驚若夢何當長致屈杯盆晨夕共宿泰康寺山行已八日不覺足生繭弛擔憩僧堂敘舊接語軟夙昔懷道心故遇相知展山高秋氣涼林靜鍾聲衍松竹交繁隂雲霧互舒卷焚香鵲噪簷聽經鹿下峴大道本無為飛光自流轉相與嗜道腴至味足咀吮始知方外交外物自可遣何如湛秋潭誅茅在雲巘擬上張使君括蒼有仙人手持白玉節指揮日月下甘霖遍江浙豈惟蘇畎畝亦喜洗炎熱左顧流福星右盼飛翔雪翩然騎紫鳯八紘盡超越直上青雲端開關朝帝闕五言律中秋夜月中秋今夜是分外月新明大地山河影五行金水精隂雲何處至天闕幾時清終被風吹散寒光照四更久雨一雨五十日春光渾不知有天皆滲漏無地不淋漓孤鶴迷空渚群蛙閙淺池因思盛衰理天地有還期遷梧坂四首三載離家久一時為此留樹高風衮衮山近日浮浮簟枕優吾老詩書為子謀不知穹壤內兵甲幾時休日下文機寨雲生梧坂村人家連樹暗客路到溪分鬢色愁中改吾儕亂後存邊州正格鬭天際暮雲昏同居三十載喪亂自分違舊宅依然在荒郊不可歸物華還似昔人事已知非安得吾昆弟金錢共采薇舊友程劉許時還到我家論文嫌晷短惜日畏年加相見渾無厭勞生未有涯吾衰方著述安得筆生花七言律甲午再寄徐竹隱分明竹下立多時侍立前頭是令兒白飯滿匙翻玉粒黃花泛酒飲金巵浙東舊雨三年别江北春雲千里思雞唱覺來元是夢披衣起寫寄君詩次劉用晦約逰少華韻近山惟有此山尊飬鶴仙人玉一群前約已過休落帽後期直上好書雲也知乘興尋仙侶絶勝偷生避哨軍莫若來春風雨過杖藜閒訪玉宸君挽程思齊記得中秋過我居欲謀一館授詩書論交如子情尤密聞訃令人慟有餘作賦鄉闈曾奏捷修文地下是新除九京一去不復返花落䳌啼春夢虛余宗暘來訪值雪留三日次韻誰散珠璣北斗南下方臺殿玉華含千山萬山樹生色一日二日客停驂烹茶自是陶穀愛嚙氊惟有蘇武堪大厦何由庇寒士休說中原鬭戰酣次程仲京韻避地曾來銀嶺居識荆已是二年餘梅花開白蒙賡韻橘子埀金辱寄書新似躍金歸大冶清如流水出方諸珍藏篋笥時開玩坐想高風玉不如次虞伯生韻紅塵擾擾漾人身我欲去尋祁孔賓為問掛瓢箕水上何如持釣渭江濱風烟滿目青山暗歲月驚心白髮新小閣琴聲有深意知音畢竟是何人辛丑栽菊與去年同春花多在樹頭開不比秋花籬下栽黃白參差晚色靚紫紅炫耀曙光回去年有客擕樽到今日無人送酒來更覺花前增好景風吹丹葉下蒼苔上王默庵分憲登車慷慨志澄清戢暴安民政有聲道上豺狼俱已遁草中狐兔每先驚風生白簡烏臺肅日照皇華繡斧明好佐明時清四海蒼生從此樂升平永年堂高堂四面愛清輝中有仙人虎兕姿玉樹臨風凝骨骼氷壺出壑耀鬚睂彎弓馬上曾穿札橫槊軍前解賦詩手種甘棠期勿伐成隂蔽芾使人思寄吳僉憲又持玉節過柯城一道蒼生覩福星愧我窮經頭已白遇公傾蓋眼尤青渚蒲水荇迎舟滑野草山花拂袂馨回首金華高萬仭峯前日暮碧雲停和憲使王公韻宫柳扶踈滿眼青金溪南出去途平風生衣袂草香細日轉郵亭花影橫使者乘驄巡郡邑大君有命在京城此行深應疲民望一雨還令枯稿生積雨初收嵐影昏瞳矇日色照袍溫觀風使者下山邑迎馬皇華炫晚村遠近水光明翠黛參差禽語發幽園青春自好民疲甚到處莫教狼虎存挽門人曾向東風囑早歸雁回霜浦忽傳悲若非九地修文日定是三天作記時陟岵尚憐諸子幼望雲翻起二親思平生友愛多零落目極鄉閭淚滿衣遊少華山題金沙廟此是登山第四程淡烟籠日漏微明千疇䆉稏黃雲合萬壑松杉翠雨聲舊約屢更猶未定塵緣不顧始成行高峯突起層霄上明發躋攀禮玉清題少華山今朝同陟最高峯鳥道縈紆一線通上界星辰來鶴馭下方雷雨出龍宫地臨高爽仙踪古人在清閒俗慮空濁世干戈猶未息便當學道此山中詠十二歲妓思凡不肯住瀛洲降謫人間十二秋歌落梁塵櫻口小舞回扇影柳腰柔惟同秋月春風笑未識朝雲暮雨愁漸覺微紅潮臉薄更乘半醉按涼州五言絶塔山天低雲有影日午塔無隂極目三秋望登高萬里心七言絶次董仲可寄韻二首四十年前㑹董仙秋風回棹浙江前如今滿目風塵暗祗有山中可晏然其二忽辱新詩寄小軒驪珠顆顆照東園何當共剪東園韭却對青山論道源送邑吏楊德茂二首刀筆從來有異聲琴堂贊畫合人情常山令尹明如鏡又抱文書鏡裏行其二相逢正好又相違分袂沙頭折柳枝三疊陽關歌未了斜風吹雨日西時桐山老農集卷四
